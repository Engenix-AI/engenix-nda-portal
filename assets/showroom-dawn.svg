<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Dealership showroom at dawn</title>
<desc id="desc">Editorial architectural illustration of a quiet dealership showroom before opening.</desc>
