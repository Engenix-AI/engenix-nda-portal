<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V4 Threshold Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Ambient Glows -->
  <div class="ambient-glow bg-glow-left"></div>
  <div class="ambient-glow bg-glow-right"></div>

  <!-- Header Section -->
  <header class="v4-header">
    <div class="header-inner">
      <div class="brand">
        <h1>V4 <span>Threshold</span></h1>
      </div>
      <nav class="nav-links">
        <a href="#" class="active">Dashboard</a>
        <a href="#">Analytics</a>
        <a href="#">System</a>
      </nav>
    </div>
  </header>

  <!-- Main System Container -->
  <main class="abstract-system">
    
    <!-- Central Core Visualizer -->
    <div class="abstract-core">
      <!-- Animated Visualizer Rings -->
      <div class="v3-ring ring-one"></div>
      <div class="v3-ring ring-two"></div>
      <div class="v3-ring ring-three"></div>
      
      <!-- Core HUD Overlay -->
      <div class="core-hud">
        <h2>94.2<span>%</span></h2>
        <p>SYSTEM INTEGRITY</p>
      </div>
    </div>

    <!-- Multi-Column Metrics Readout -->
    <div class="abstract-readout">
      <div>
        <span>Core Frequency</span>
        <strong>4.82 GHz</strong>
      </div>
      <div>
        <span>Network Load</span>
        <strong>14.2 Gbps</strong>
      </div>
      <div>
        <span>Thermal Array</span>
        <strong>38°C</strong>
      </div>
      <div>
        <span>Operational Status</span>
        <strong style="color: #10b981;">OPTIMAL</strong>
      </div>
    </div>

  </main>

</body>
</html>
